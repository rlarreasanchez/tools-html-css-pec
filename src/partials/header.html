<a
	class="skip-link"
	href="#main-content"
	>Saltar al contenido principal</a
>
<header class="site-header">
	<div class="site-header__container">
		<a
			href="/"
			class="site-header__logo"
			aria-label="Sabor y Tradición - Ir a la página de inicio"
		>
			<span class="site-header__logo-text"
				>Sabor <span class="site-header__logo-ampersand">&</span> Tradición</span
			>
		</a>

		<button
			class="site-header__menu-toggle"
			type="button"
			aria-expanded="false"
			aria-controls="main-navigation"
			aria-label="Abrir menú de navegación"
		>
			<span
				class="site-header__menu-icon"
				aria-hidden="true"
			></span>
		</button>

		<nav
			id="main-navigation"
			class="site-nav"
			aria-label="Navegación Principal"
		>
			<ul class="site-nav__list">
				<li class="site-nav__item">
					<a
						href="/"
						class="site-nav__link site-nav__link--active"
						aria-label="Ir a la página de inicio"
					>
						<i
							class="fas fa-home icon-space-right"
							aria-hidden="true"
						></i>
						Inicio
					</a>
				</li>
				<li class="site-nav__item">
					<a
						href="/categoria"
						class="site-nav__link"
						aria-label="Ir a la sección de recetas"
					>
						<i
							class="fas fa-utensils icon-space-right"
							aria-hidden="true"
						></i>
						Recetas
					</a>
				</li>
				<li class="site-nav__item">
					<a
						href="/links"
						class="site-nav__link"
						aria-label="Ir a la sección de enlaces"
					>
						<i
							class="fas fa-link icon-space-right"
							aria-hidden="true"
						></i>
						Enlaces
					</a>
				</li>
			</ul>
		</nav>
	</div>
</header>
