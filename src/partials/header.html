<header
	class="site-header"
	role="banner"
>
	<div class="site-header__container">
		<a
			href="/"
			class="site-header__logo"
			aria-label="Sabor y Tradición - Ir a la página de inicio"
		>
			<span class="site-header__logo-text"
				>Sabor <span class="site-header__logo-ampersand">&</span> Tradición</span
			>
		</a>

		<button
			class="site-header__menu-toggle"
			type="button"
			aria-expanded="false"
			aria-controls="main-navigation"
			aria-label="Abrir menu de navegación"
		>
			<span
				class="site-header__menu-icon"
				aria-hidden="true"
			></span>
		</button>

		<nav
			id="main-navigation"
			class="site-nav"
			aria-label="Navegación Principal"
		>
			<ul
				class="site-nav__list"
				role="list"
			>
				<li class="site-nav__item">
					<a
						href="index.html"
						class="site-nav__link site-nav__link--active"
					>
						Inicio
					</a>
				</li>
				<li class="site-nav__item">
					<a
						href="#"
						class="site-nav__link"
					>
						Recetas
					</a>
				</li>
				<li class="site-nav__item">
					<a
						href="#"
						class="site-nav__link"
					>
						Enlaces
					</a>
				</li>
			</ul>
		</nav>
	</div>
</header>
