<div class="recipe-card">
	<a
		href="{{ recipe.link }}"
		class="recipe-card__link"
		aria-label="{{ recipe.link_aria_label }}"
	>
		<!-- Imagen de la receta -->
		<div class="recipe-card__image-wrapper">
			<picture>
				<!-- WebP con diferentes tamaños (resolution switching) -->
				<source
					type="image/webp"
					srcset="
						../images/{{ recipe.image }}?as=webp&width=300 300w,
						../images/{{ recipe.image }}?as=webp&width=400 400w,
						../images/{{ recipe.image }}?as=webp&width=600 600w,
						../images/{{ recipe.image }}?as=webp&width=800 800w
					"
					sizes="
						(max-width: 768px) 100vw,
						(max-width: 1024px) 50vw,
						(max-width: 1200px) 33.33vw,
						400px
					"
				/>
				<!-- Fallback con diferentes tamaños -->
				<img
					src="../images/{{ recipe.image }}?width=300"
					srcset="
						../images/{{ recipe.image }}?width=300 300w,
						../images/{{ recipe.image }}?width=400 400w,
						../images/{{ recipe.image }}?width=600 600w,
						../images/{{ recipe.image }}?width=800 800w
					"
					sizes="
							(max-width: 768px) 100vw,
							(max-width: 1024px) 50vw,
							(max-width: 1200px) 33.33vw,
							400px
					"
					alt="{{ recipe.alt_image }}"
					class="recipe-card__image"
					width="400"
					height="300"
					loading="lazy"
				/>
			</picture>

			<!-- Categoría de la receta -->
			<span class="recipe-card__category">
				<span class="sr-only">Categoría: </span>
				{{ recipe.category }}
			</span>
		</div>

		<!-- Contenido de la receta -->
		<div class="recipe-card__content">
			<h3 class="recipe-card__title">{{{ recipe.title_html }}}</h3>
			<p class="recipe-card__description">{{{ recipe.description_html }}}</p>
			<div class="recipe-card__meta">
				<div class="recipe-card__meta-item">
					<i
						class="far fa-clock icon--primary"
						aria-hidden="true"
					></i>
					<span class="sr-only">Duración: </span>
					{{ recipe.duration }}
				</div>
				<div class="recipe-card__meta-item">
					<i
						class="far fa-star icon--primary"
						aria-hidden="true"
					></i>
					<span class="sr-only">Dificultad: </span>
					{{ recipe.difficulty }}
				</div>
			</div>
		</div>
	</a>
</div>
