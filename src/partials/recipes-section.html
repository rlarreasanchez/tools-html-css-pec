<section
	id="recetas"
	class="recipes"
	aria-labelledby="recipes-heading"
>
	<div class="recipes__container">
		<div
			class="recipes__header"
			data-aos="fade-up"
		>
			<span class="section-label">Destacados</span>
			<h2
				id="recipes-heading"
				class="section-title"
			>
				Recetas del momento
			</h2>
			<p class="section-description">
				Una selección de nuestras preparaciones favoritas de esta temporada, con ingredientes
				frescos y de proximidad
			</p>
		</div>

		<!-- Carrousel de Recetas (Swiper) -->
		<div
			class="recipes-swiper swiper"
			data-aos="fade-up"
			data-aos-delay="200"
		>
			<ul class="recipes__grid swiper-wrapper">
				<each loop="recipe in recipes.slice(0, 6)">
					<li class="swiper-slide">
						<include
							src="partials/recipe-card.html"
							locals="recipe"
						>
						</include>
					</li>
				</each>
			</ul>
			<div class="swiper-pagination"></div>
		</div>
	</div>
</section>
