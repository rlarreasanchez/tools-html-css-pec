<section
	class="hero"
	aria-labelledby="hero-heading"
>
	<!-- Capa de superposición oscura -->
	<div
		class="hero__overlay"
		aria-hidden="true"
	></div>

	<!-- Imagen de fondo -->
	<div class="hero__image-wrapper">
		<picture>
			<!-- Móvil -->
			<source
				media="(max-width: 767px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=640&height=640&fit=cover   1x,
					../images/hero.jpg?as=webp&width=1280&height=1280&fit=cover 2x
				"
			/>
			<source
				media="(max-width: 767px)"
				srcset="
					../images/hero.jpg?width=640&height=640&fit=cover   1x,
					../images/hero.jpg?width=1280&height=1280&fit=cover 2x
				"
			/>
			<!-- Tablet -->
			<source
				media="(min-width: 768px) and (max-width: 1023px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=1024&height=640&fit=cover  1x,
					../images/hero.jpg?as=webp&width=2048&height=1280&fit=cover 2x
				"
			/>
			<source
				media="(min-width: 768px) and (max-width: 1023px)"
				srcset="
					../images/hero.jpg?width=1024&height=640&fit=cover  1x,
					../images/hero.jpg?width=2048&height=1280&fit=cover 2x
				"
			/>
			<!-- Desktop -->
			<source
				media="(min-width: 1024px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=1600&height=900  1x,
					../images/hero.jpg?as=webp&width=3200&height=1800 2x
				"
			/>
			<source
				media="(min-width: 1024px)"
				srcset="
					../images/hero.jpg?width=1600&height=900  1x,
					../images/hero.jpg?width=3200&height=1800 2x
				"
			/>
			<!-- Fallback -->
			<img
				class="hero__image"
				src="../images/hero.jpg?width=1600&height=900"
				alt="Productos e ingredientes para receta tradicional"
				width="1600"
				height="900"
				loading="eager"
			/>
		</picture>
	</div>

	<!-- Contenido -->
	<div class="hero__content">
		<h1
			id="hero-heading"
			class="hero__title"
			data-aos="fade-up"
			data-aos-duration="1000"
		>
			El arte de cocinar<br />
			<span class="hero__title-accent">con alma y tradición</span>
		</h1>
		<p
			class="hero__subtitle"
			data-aos="fade-up"
			data-aos-delay="200"
		>
			Recetas tradicionales, técnicas de autor y la pasión por los sabores auténticos llevados a la
			mesa.
		</p>
		<div
			class="hero__buttons"
			data-aos="fade-up"
			data-aos-delay="400"
		>
			<a
				href="#recetas"
				class="btn btn--primary"
			>
				<i
					class="fas fa-utensils icon-space-right"
					aria-hidden="true"
				></i>
				Explorar Recetas
			</a>
			<a
				href="#sobre-nosotros"
				class="btn btn--outline"
			>
				<i
					class="fas fa-book-open icon-space-right"
					aria-hidden="true"
				></i>
				Sobre Nosotros
			</a>
		</div>
	</div>
</section>
