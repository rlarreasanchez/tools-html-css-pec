<section
	class="hero"
	aria-labelledby="hero-heading"
>
	<div
		class="hero__overlay"
		aria-hidden="true"
	></div>
	<div class="hero__image-wrapper">
		<img
			class="hero__image"
			src="../images/hero.jpg"
			alt="Productos e ingredientes para receta tradicional"
			width="1600"
			height="900"
			loading="eager"
		/>
	</div>
	<div class="hero__content">
		<h1
			id="hero-heading"
			class="hero__title"
		>
			El arte de cocinar<br />
			<span class="hero__title-accent">con alma y tradición</span>
		</h1>
		<p class="hero__subtitle">
			Recetas tradicionales, técnicas de autor y la pasión por los sabores auténticos llevados a la
			mesa.
		</p>
		<div class="hero__buttons">
			<a
				href="#recetas"
				class="btn btn--primary"
			>
				<i
					class="fas fa-utensils icon-space-right"
					aria-hidden="true"
				></i>
				Explorar Recetas
			</a>
			<a
				href="#sobre-nosotros"
				class="btn btn--outline"
			>
				<i
					class="fas fa-book-open icon-space-right"
					aria-hidden="true"
				></i>
				Sobre Nosotros
			</a>
		</div>
	</div>
</section>
