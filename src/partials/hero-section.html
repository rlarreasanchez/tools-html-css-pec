<section
	class="hero"
	aria-labelledby="hero-heading"
>
	<!-- Capa de superposición oscura -->
	<div
		class="hero__overlay"
		aria-hidden="true"
	></div>

	<!-- Imagen de fondo -->
	<div class="hero__image-wrapper">
		<picture>
			<!-- Móvil -->
			<source
				media="(max-width: 767px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=640&height=640&fit=cover   1x,
					../images/hero.jpg?as=webp&width=1280&height=1280&fit=cover 2x
				"
			/>
			<source
				media="(max-width: 767px)"
				srcset="
					../images/hero.jpg?width=640&height=640&fit=cover   1x,
					../images/hero.jpg?width=1280&height=1280&fit=cover 2x
				"
			/>
			<!-- Tablet -->
			<source
				media="(min-width: 768px) and (max-width: 1023px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=1024&height=640&fit=cover  1x,
					../images/hero.jpg?as=webp&width=2048&height=1280&fit=cover 2x
				"
			/>
			<source
				media="(min-width: 768px) and (max-width: 1023px)"
				srcset="
					../images/hero.jpg?width=1024&height=640&fit=cover  1x,
					../images/hero.jpg?width=2048&height=1280&fit=cover 2x
				"
			/>
			<!-- Desktop -->
			<source
				media="(min-width: 1024px)"
				type="image/webp"
				srcset="
					../images/hero.jpg?as=webp&width=1600&height=900  1x,
					../images/hero.jpg?as=webp&width=3200&height=1800 2x
				"
			/>
			<source
				media="(min-width: 1024px)"
				srcset="
					../images/hero.jpg?width=1600&height=900  1x,
					../images/hero.jpg?width=3200&height=1800 2x
				"
			/>
			<!-- Fallback -->
			<img
				class="hero__image"
				src="../images/hero.jpg?width=1600&height=900"
				alt="Productos e ingredientes para receta tradicional"
				width="1600"
				height="900"
				loading="eager"
			/>
		</picture>
	</div>

	<!-- Contenido -->
	<div class="hero__content">
		<div
			class="hero__svg-decoration"
			aria-hidden="true"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 200 200"
				class="elegant-cutlery"
			>
				<g class="plate">
					<circle
						cx="100"
						cy="100"
						r="48"
						fill="transparent"
						stroke="#c5a059"
						stroke-width="1.5"
					/>
					<circle
						cx="100"
						cy="100"
						r="34"
						fill="none"
						stroke="#e8e4d9"
						stroke-width="1"
					/>
					<path
						d="M60,80 A40,40 0 0,1 80,60"
						fill="none"
						stroke="#fcfbf9"
						stroke-width="2"
						stroke-linecap="round"
					/>
				</g>

				<g class="fork">
					<line
						x1="40"
						y1="95"
						x2="40"
						y2="155"
						stroke="#fcfbf9"
						stroke-width="3.5"
						stroke-linecap="round"
					/>
					<path
						d="M30,75 C30,95 50,95 50,75"
						fill="none"
						stroke="#fcfbf9"
						stroke-width="2.5"
						stroke-linecap="round"
					/>
					<line
						x1="30"
						y1="45"
						x2="30"
						y2="75"
						stroke="#fcfbf9"
						stroke-width="2"
						stroke-linecap="round"
					/>
					<line
						x1="36.6"
						y1="45"
						x2="36.6"
						y2="75"
						stroke="#fcfbf9"
						stroke-width="2"
						stroke-linecap="round"
					/>
					<line
						x1="43.3"
						y1="45"
						x2="43.3"
						y2="75"
						stroke="#fcfbf9"
						stroke-width="2"
						stroke-linecap="round"
					/>
					<line
						x1="50"
						y1="45"
						x2="50"
						y2="75"
						stroke="#fcfbf9"
						stroke-width="2"
						stroke-linecap="round"
					/>
				</g>

				<g class="knife">
					<line
						x1="160"
						y1="95"
						x2="160"
						y2="155"
						stroke="#fcfbf9"
						stroke-width="4"
						stroke-linecap="round"
					/>
					<path
						d="M158,95 L158,45 C165,50 163,80 162,95 Z"
						fill="#fcfbf9"
					/>
				</g>
			</svg>
		</div>

		<h1
			id="hero-heading"
			class="hero__title"
			data-aos="fade-up"
			data-aos-duration="1000"
		>
			El arte de cocinar<br />
			<span class="hero__title-accent">con alma y tradición</span>
		</h1>
		<p
			class="hero__subtitle"
			data-aos="fade-up"
			data-aos-delay="200"
		>
			Recetas tradicionales, técnicas de autor y la pasión por los sabores auténticos llevados a la
			mesa.
		</p>
		<div
			class="hero__buttons"
			data-aos="fade-up"
			data-aos-delay="400"
		>
			<a
				href="#recetas"
				class="btn btn--primary"
			>
				<i
					class="fas fa-utensils icon-space-right"
					aria-hidden="true"
				></i>
				Explorar Recetas
			</a>
			<a
				href="#sobre-nosotros"
				class="btn btn--outline"
			>
				<i
					class="fas fa-book-open icon-space-right"
					aria-hidden="true"
				></i>
				Sobre Nosotros
			</a>
		</div>
	</div>
</section>
